<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>無口君 爐石戰場 排組對策站</title>
  <meta name="description" content="無口君（Wuco）爐石戰記英雄戰場影片分析 — 提升素質排組、終局對策、雙打專區。" />
  <link rel="icon" type="image/png" href="img/wuco_logo.png?v=0.6.1" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+TC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=0.6.1" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-row">
      <img class="site-logo" src="img/wuco_logo.png?v=0.6.1" alt="Wuco 無口君" />
      <span class="page-title">無口君 爐石戰場</span>
      <span class="badge-season" id="seasonBadge" style="display:none"></span>
      <span class="badge-ver" id="hsVersion" style="display:none"></span>
      <span class="header-src">資料來源：<a id="sourceLink" href="https://www.youtube.com/@Wuco/videos" target="_blank" rel="noopener">@Wuco</a> ｜ 更新 <span id="lastUpdated">—</span></span>
    </div>
    <nav class="wrap tabs" role="tablist">
      <button class="tab is-active" data-tab="tier"    role="tab">⚔️ 排組頁 <small>Tier List</small></button>
      <button class="tab"           data-tab="counter" role="tab">🛡️ 對策頁 <small>Counter</small></button>
      <button class="tab"           data-tab="duo"     role="tab">👥 雙打專區 <small>Duo</small></button>
    </nav>
  </header>

  <main class="wrap">
    <!-- 排組頁 -->
    <section id="tab-tier" class="tabpanel is-active">
      <div class="filterbar">
        <div class="filter-row" id="tierFilterRow"></div>
        <div class="filter-row" id="raceFilterRow"></div>
        <div class="filter-row meta-row">
          <span class="count" id="tierCount">—</span>
          <label class="toggle"><input type="checkbox" id="showAllBuilds" /><span>📚 顯示全部牌組（含合併變體）</span></label>
          <label class="toggle"><input type="checkbox" id="showOldVersion" /><span>🗃️ 顯示歸檔</span></label>
        </div>
      </div>
      <div id="tierList"></div>
    </section>

    <!-- 對策頁 -->
    <section id="tab-counter" class="tabpanel">
      <p class="note">🛡️ 終局對策 — 依「遇到什麼怎麼辦」對應對策排組。點一列看詳情。</p>
      <div class="filterbar">
        <div class="filter-row" id="counterFilterRow"></div>
        <div class="filter-row" id="counterRaceFilterRow"></div>
        <div class="filter-row meta-row"><span class="count" id="counterCount">—</span></div>
      </div>
      <div id="counterList"></div>
    </section>

    <!-- 雙打專區 -->
    <section id="tab-duo" class="tabpanel">
      <p class="note" id="duoIntro"></p>
      <div id="duoList" class="duo-grid"></div>
    </section>
  </main>

  <!-- detail modal -->
  <div class="modal-backdrop" id="modal">
    <div class="modal-box" id="modalBox"></div>
  </div>

  <footer class="site-footer wrap">
    <p>非官方粉絲站 ｜ 內容整理自無口君公開影片，版權歸原作者所有。</p>
    <p>Project HS_Wuco ｜ 前端 GitHub Pages ｜ 資料：hs-battlegrounds-analyst</p>
  </footer>

  <script src="js/app.js?v=0.6.1"></script>
</body>
</html>
